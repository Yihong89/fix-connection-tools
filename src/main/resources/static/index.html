<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIX Connection Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h1 class="logo">FIX<span class="dim">tools</span></h1>

    <!-- Connection Form -->
    <section class="section">
      <h2 class="section-title">Connection</h2>
      <div class="form-group">
        <label for="host">Host</label>
        <input type="text" id="host" value="127.0.0.1" placeholder="e.g. 192.168.1.10">
      </div>
      <div class="form-group">
        <label for="port">Port</label>
        <input type="number" id="port" value="9878" placeholder="e.g. 9878">
      </div>
      <div class="form-group">
        <label for="sender">SenderCompID (49)</label>
        <input type="text" id="sender" value="WEBAPP" placeholder="Your FIX sender">
      </div>
      <div class="form-group">
        <label for="target">TargetCompID (56)</label>
        <input type="text" id="target" value="SERVER" placeholder="FIX target">
      </div>
      <button id="connectBtn" class="btn btn-primary">Connect</button>
    </section>

    <!-- Status -->
    <section class="section">
      <h2 class="section-title">Status</h2>
      <div id="status" class="status status-disconnected">Disconnected</div>
      <div id="statusDetail" class="status-detail"></div>
    </section>

    <!-- Quick Send -->
    <section class="section">
      <h2 class="section-title">Quick Send</h2>
      <div class="form-group">
        <button class="btn btn-sm" data-msg="8=FIX.4.4|35=A|49=WEBAPP|56=SERVER|34=1|52=YYYYMMDD-HH:MM:SS|98=0|108=30|10=XXX">Logon (35=A)</button>
        <button class="btn btn-sm" data-msg="8=FIX.4.4|35=0|49=WEBAPP|56=SERVER|34=NN|52=YYYYMMDD-HH:MM:SS|10=XXX">Heartbeat (35=0)</button>
        <button class="btn btn-sm" data-msg="8=FIX.4.4|35=5|49=WEBAPP|56=SERVER|34=NN|52=YYYYMMDD-HH:MM:SS|10=XXX">Logout (35=5)</button>
      </div>
    </section>

    <!-- Actions -->
    <section class="section">
      <button id="clearBtn" class="btn">Clear Log</button>
    </section>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
      <span class="toolbar-title">Message Log</span>
      <span id="msgCount" class="msg-count">0 messages</span>
    </div>
    <div id="log" class="log"></div>
    <div class="input-bar">
      <input type="text" id="msgInput" placeholder="Type a FIX message or use Quick Send..." disabled>
      <button id="sendBtn" class="btn btn-primary" disabled>Send</button>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
